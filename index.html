<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eric Anderson</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #fff;
            color: #111;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            border-bottom: 1px solid #ddd;
            padding: 0 1.5rem;
            height: 52px;
            display: flex;
            align-items: center;
        }
        .nav-logo {
            font-size: 0.9rem;
            font-weight: 700;
            color: #111;
            text-decoration: none;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 1.5rem;
        }

        .hero { max-width: 520px; width: 100%; }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1.1;
            margin-bottom: 0.75rem;
        }

        .hero p {
            font-size: 1rem;
            color: #555;
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }

        .links-list { display: flex; flex-direction: column; gap: 0; }

        .link-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid #eee;
            text-decoration: none;
            color: #111;
        }
        .link-row:first-child { border-top: 1px solid #eee; }
        .link-row:hover .link-row-title { text-decoration: underline; text-underline-offset: 3px; }

        .link-row-title { font-size: 0.95rem; font-weight: 700; }
        .link-row-sub { font-size: 0.82rem; color: #777; margin-top: 0.15rem; }
        .link-row-arrow { color: #aaa; }

        @media (max-width: 480px) {
            .hero h1 { font-size: 1.75rem; }
        }
    </style>
</head>
<body>

<nav>
    <a href="/" class="nav-logo">Eric Anderson</a>
</nav>

<main>
    <div class="hero">
        <h1>Eric Anderson</h1>
        <p>A personal site with projects and tools.</p>

        <div class="links-list">
            <a href="/learning-games/" class="link-row">
                <div>
                    <div class="link-row-title">Learning Games</div>
                    <div class="link-row-sub">Spelling, counting, and more for kids</div>
                </div>
                <span class="link-row-arrow">→</span>
            </a>
        </div>
    </div>
</main>

</body>
</html>
