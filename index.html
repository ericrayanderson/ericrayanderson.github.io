<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eric Anderson</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f4f6f9;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent: #4f46e5;
            --accent-light: #eef2ff;
            --accent-hover: #4338ca;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 1.5rem;
            height: 56px;
            display: flex;
            align-items: center;
        }
        .nav-logo {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 1.5rem;
        }

        .hero {
            max-width: 560px;
            width: 100%;
        }

        .hero-label {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent);
            background: var(--accent-light);
            padding: 0.3rem 0.7rem;
            border-radius: 4px;
            margin-bottom: 1.25rem;
        }

        .hero h1 {
            font-size: 2.75rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1.15;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1.05rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 2.5rem;
            max-width: 440px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }

        .link-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.25rem;
            text-decoration: none;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            transition: box-shadow 0.15s, transform 0.15s, border-color 0.15s;
        }
        .link-card:hover {
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            transform: translateY(-2px);
            border-color: #c7d2fe;
        }
        .link-card:active { transform: scale(0.98); }

        .link-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--accent-light);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.1rem;
        }

        .link-text { display: flex; flex-direction: column; gap: 0.2rem; }
        .link-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }
        .link-sub {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        @media (max-width: 480px) {
            .hero h1 { font-size: 2rem; }
            .card-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav>
    <a href="/" class="nav-logo">Eric Anderson</a>
</nav>

<main>
    <div class="hero">
        <span class="hero-label">Welcome</span>
        <h1>Eric Anderson</h1>
        <p>A personal site with projects and tools. Explore the links below to get started.</p>

        <div class="card-grid">
            <a href="/learning-games/" class="link-card">
                <div class="link-icon">✏️</div>
                <div class="link-text">
                    <div class="link-title">Learning Games</div>
                    <div class="link-sub">Spelling, counting, and more for kids</div>
                </div>
            </a>
        </div>
    </div>
</main>

</body>
</html>
