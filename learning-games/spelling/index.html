<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spell It · Learning Games</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #fff;
            color: #111;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        nav {
            border-bottom: 1px solid #ddd;
            padding: 0 1.5rem;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-logo {
            font-size: 0.9rem;
            font-weight: 700;
            color: #111;
            text-decoration: none;
        }
        .nav-links { display: flex; gap: 0.5rem; }
        .nav-link {
            font-size: 0.85rem;
            font-weight: 500;
            color: #555;
            text-decoration: none;
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
        }
        .nav-link:hover { color: #111; }
        .nav-link.active { color: #111; font-weight: 700; text-decoration: underline; text-underline-offset: 3px; }
        .fullscreen-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: 1px solid #ccc;
            color: #555;
            width: 32px;
            height: 32px;
            cursor: pointer;
            flex-shrink: 0;
            margin-left: 0.75rem;
        }
        .fullscreen-btn:hover { border-color: #111; color: #111; }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem 2rem;
            border: 1px solid #ddd;
        }

        /* START SCREEN */
        #start-screen { text-align: center; }
        .start-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: #111;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }
        .start-sub {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .btn-start {
            display: inline-block;
            background: #111;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 0.65rem 2rem;
            border: none;
            cursor: pointer;
            letter-spacing: 0.01em;
        }
        .btn-start:active { opacity: 0.8; }

        /* GAME SCREEN */
        #game-screen { display: none; }

        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }
        .speak-btn {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            background: none;
            color: #111;
            border: 1px solid #ccc;
            padding: 0.4rem 0.7rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
        }
        .speak-btn:hover { border-color: #111; }

        .score-label {
            font-size: 0.8rem;
            font-weight: 500;
            color: #555;
        }
        .score-label strong { color: #111; font-weight: 700; }

        .picture-area {
            text-align: center;
            font-size: 5rem;
            line-height: 1;
            margin-bottom: 2rem;
        }

        /* WORD SLOTS */
        .word-slots {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }
        .slot-wrapper { display: flex; flex-direction: column; align-items: center; gap: 0.35rem; }
        .slot {
            width: 72px;
            height: 80px;
            border: 1.5px solid #bbb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            color: #111;
            transition: border-color 0.1s;
        }
        .slot.filled {
            border: 2.5px solid #111;
        }
        .slot-num {
            font-size: 0.65rem;
            font-weight: 500;
            color: #aaa;
        }

        /* LETTER BANK */
        .letter-bank {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
        }
        .letter-btn {
            width: 72px;
            height: 72px;
            background: #fff;
            border: 1.5px solid #bbb;
            font-family: 'Inter', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            color: #111;
            cursor: pointer;
            transition: border-color 0.1s;
        }
        .letter-btn:hover:not(:disabled) {
            border-color: #111;
        }
        .letter-btn:active:not(:disabled) { opacity: 0.7; }
        .letter-btn:disabled {
            opacity: 0.15;
            cursor: default;
        }
        .letter-btn.shake {
            animation: shake 0.28s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* WIN */
        .win-line {
            display: none;
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: #555;
            letter-spacing: 0.01em;
        }
        .win-line.visible { display: block; }

        .hidden { display: none !important; }

        @media (max-width: 400px) {
            .card { padding: 2rem 1.25rem; }
            .slot, .letter-btn { width: 62px; }
            .slot { height: 70px; font-size: 1.75rem; }
            .letter-btn { height: 62px; }
            .picture-area { font-size: 4rem; }
        }
    </style>
</head>
<body>

<nav>
    <a href="../" class="nav-logo">Learning Games</a>
    <div style="display:flex;align-items:center;">
        <div class="nav-links">
            <a href="../" class="nav-link">Home</a>
            <a href="./" class="nav-link active">Spelling</a>
            <a href="../counting/" class="nav-link">Counting</a>
            <a href="../addition/" class="nav-link">Addition</a>
        </div>
        <button class="fullscreen-btn" id="fs-btn" onclick="toggleFullscreen()" title="Full screen">
            <svg id="fs-icon-expand" viewBox="0 0 20 20" fill="currentColor" width="15" height="15"><path fill-rule="evenodd" d="M3 4a1 1 0 011-1h4a1 1 0 010 2H6.414l2.293 2.293a1 1 0 11-1.414 1.414L5 6.414V8a1 1 0 01-2 0V4zm9 1a1 1 0 010-2h4a1 1 0 011 1v4a1 1 0 01-2 0V6.414l-2.293 2.293a1 1 0 11-1.414-1.414L13.586 5H12zm-9 7a1 1 0 012 0v1.586l2.293-2.293a1 1 0 111.414 1.414L6.414 15H8a1 1 0 010 2H4a1 1 0 01-1-1v-4zm13-1a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 010-2h1.586l-2.293-2.293a1 1 0 111.414-1.414L15 13.586V12a1 1 0 011-1z" clip-rule="evenodd"/></svg>
            <svg id="fs-icon-compress" viewBox="0 0 20 20" fill="currentColor" width="15" height="15" style="display:none"><path fill-rule="evenodd" d="M5 4a1 1 0 011 1v2.586l2.293-2.293a1 1 0 111.414 1.414L7.414 9H10a1 1 0 010 2H5a1 1 0 01-1-1V5a1 1 0 011-1zm10 0a1 1 0 011 1v4a1 1 0 01-1 1h-5a1 1 0 010-2h2.586l-2.293-2.293a1 1 0 111.414-1.414L14.586 7V5a1 1 0 011-1zM5 11a1 1 0 011 1v2.586l2.293-2.293a1 1 0 111.414 1.414L7.414 16H10a1 1 0 010 2H5a1 1 0 01-1-1v-5a1 1 0 011-1zm10 0a1 1 0 011 1v5a1 1 0 01-1 1h-5a1 1 0 010-2h2.586l-2.293-2.293a1 1 0 111.414-1.414L14.586 13V12a1 1 0 011-1z" clip-rule="evenodd"/></svg>
        </button>
    </div>
</nav>

<main>
    <div class="card">

        <div id="start-screen">
            <h1 class="start-title">Spell It</h1>
            <p class="start-sub">Look at the picture and tap the letters in the right order to spell the word.</p>
            <button class="btn-start" onclick="startGame()">Begin</button>
        </div>

        <div id="game-screen">
            <div class="game-header">
                <button class="speak-btn" onclick="speakWord()">
                    <svg viewBox="0 0 20 20" fill="currentColor" width="13" height="13"><path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd"/></svg>
                    Hear it
                </button>
                <span class="score-label">Score: <strong id="score-display">0</strong></span>
            </div>

            <div class="picture-area" id="picture-area"></div>
            <div class="word-slots" id="word-slots"></div>
            <div class="letter-bank" id="letter-bank"></div>
            <div class="win-line" id="win-line">Correct. Next word…</div>
        </div>

    </div>
</main>

<script>
    const words = [
        { word: 'CAT', emoji: '🐱' },
        { word: 'DOG', emoji: '🐶' },
        { word: 'SUN', emoji: '☀️' },
        { word: 'PIG', emoji: '🐷' },
        { word: 'COW', emoji: '🐮' },
        { word: 'HAT', emoji: '🎩' },
        { word: 'BUG', emoji: '🐛' },
        { word: 'BAT', emoji: '🦇' },
        { word: 'FOX', emoji: '🦊' },
        { word: 'CAR', emoji: '🚗' },
        { word: 'BUS', emoji: '🚌' },
        { word: 'CUP', emoji: '☕' },
        { word: 'EGG', emoji: '🥚' },
        { word: 'OWL', emoji: '🦉' },
        { word: 'BEE', emoji: '🐝' },
        { word: 'ANT', emoji: '🐜' },
        { word: 'ICE', emoji: '🧊' },
        { word: 'JET', emoji: '✈️' },
        { word: 'BED', emoji: '🛏️' },
        { word: 'NUT', emoji: '🥜' },
    ];

    let targetWord = '', letterIndex = 0, score = 0;
    let usedIndices = [], lastIndex = -1;

    function speak(text, rate = 0.85, pitch = 1.0) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.rate = rate; u.pitch = pitch;
        window.speechSynthesis.speak(u);
    }

    function speakWord() { if (targetWord) speak(targetWord); }

    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-screen').style.display = 'block';
        setTimeout(loadWord, 400);
    }

    function loadWord() {
        letterIndex = 0;
        document.getElementById('win-line').classList.remove('visible');
        if (usedIndices.length >= words.length) usedIndices = [];
        let idx;
        do { idx = Math.floor(Math.random() * words.length); }
        while (idx === lastIndex || usedIndices.includes(idx));
        lastIndex = idx; usedIndices.push(idx);

        const w = words[idx];
        targetWord = w.word;
        document.getElementById('picture-area').textContent = w.emoji;

        buildSlots(); buildLetterBank();
        setTimeout(() => speak(targetWord), 400);
    }

    function buildSlots() {
        const c = document.getElementById('word-slots'); c.innerHTML = '';
        for (let i = 0; i < 3; i++) {
            const wrap = document.createElement('div'); wrap.className = 'slot-wrapper';
            const slot = document.createElement('div'); slot.className = 'slot'; slot.id = `slot-${i}`;
            const num = document.createElement('div'); num.className = 'slot-num'; num.textContent = i + 1;
            wrap.appendChild(slot); wrap.appendChild(num); c.appendChild(wrap);
        }
    }

    function buildLetterBank() {
        const c = document.getElementById('letter-bank'); c.innerHTML = '';
        const letters = targetWord.split('').map((char, i) => ({ char, order: i + 1 }));
        for (let i = letters.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [letters[i], letters[j]] = [letters[j], letters[i]];
        }
        letters.forEach(({ char }) => {
            const btn = document.createElement('button'); btn.className = 'letter-btn';
            btn.textContent = char; btn.onclick = () => handleClick(char, btn);
            c.appendChild(btn);
        });
    }

    function handleClick(letter, btn) {
        if (letterIndex >= targetWord.length) return;
        if (letter === targetWord[letterIndex]) {
            speak(letter, 1.0, 1.0);
            btn.disabled = true;
            const slot = document.getElementById(`slot-${letterIndex}`);
            slot.textContent = letter; slot.classList.add('filled');
            letterIndex++;
            if (letterIndex === targetWord.length) onWin();
        } else {
            speak('Try again', 0.85, 1.0);
            btn.classList.remove('shake');
            void btn.offsetWidth;
            btn.classList.add('shake');
            btn.addEventListener('animationend', () => btn.classList.remove('shake'), { once: true });
        }
    }

    function onWin() {
        score++;
        document.getElementById('score-display').textContent = score;
        document.getElementById('win-line').classList.add('visible');
        speak(`${targetWord}. Correct.`, 0.9, 1.0);
        setTimeout(loadWord, 2800);
    }

    function toggleFullscreen() {
        const el = document.documentElement;
        const isFs = document.fullscreenElement || document.webkitFullscreenElement;
        if (isFs) {
            (document.exitFullscreen || document.webkitExitFullscreen).call(document);
        } else {
            (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
        }
    }

    function onFullscreenChange() {
        const isFs = document.fullscreenElement || document.webkitFullscreenElement;
        document.getElementById('fs-icon-expand').style.display = isFs ? 'none' : '';
        document.getElementById('fs-icon-compress').style.display = isFs ? '' : 'none';
    }

    document.addEventListener('fullscreenchange', onFullscreenChange);
    document.addEventListener('webkitfullscreenchange', onFullscreenChange);

    document.addEventListener('keydown', e => {
        const startVisible = !document.getElementById('start-screen').classList.contains('hidden');
        if (startVisible) { if (e.key === 'Enter') startGame(); return; }
        if (!targetWord || letterIndex >= targetWord.length) return;
        const k = e.key.toUpperCase();
        if (!/^[A-Z]$/.test(k)) return;
        const btns = Array.from(document.getElementById('letter-bank').querySelectorAll('button'));
        const match = btns.find(b => b.textContent === k && !b.disabled);
        if (match) handleClick(k, match); else speak('Try again', 0.85, 1.0);
    });
</script>
</body>
</html>
