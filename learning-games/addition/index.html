<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Addition Game · Learning Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #fdf4ff;
            background-image: radial-gradient(#e9d5ff 2px, transparent 2px);
            background-size: 30px 30px;
            touch-action: manipulation;
            user-select: none;
        }
        @keyframes popIn {
            0%   { transform: scale(0.5); opacity: 0; }
            80%  { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        @keyframes bounce-win {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-18px); }
        }
        .animate-pop   { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-shake { animation: shake 0.4s ease-in-out; }
        .animate-win   { animation: bounce-win 0.5s ease-in-out infinite; }

        .kid-btn {
            transition: all 0.1s;
            box-shadow: 0 6px 0 rgba(0,0,0,0.2);
        }
        .kid-btn:active:not(:disabled) {
            transform: translateY(6px);
            box-shadow: 0 0 0 rgba(0,0,0,0.2);
        }
        .kid-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: translateY(6px);
            box-shadow: 0 0 0 rgba(0,0,0,0.2);
        }
        #mobile-menu { transition: max-height 0.3s ease, opacity 0.3s ease; max-height: 0; opacity: 0; overflow: hidden; }
        #mobile-menu.open { max-height: 200px; opacity: 1; }
    </style>
</head>
<body class="min-h-screen flex flex-col text-gray-800">

    <!-- NAVBAR -->
    <nav class="bg-white shadow-md z-40 relative">
        <div class="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
            <a href="../" class="flex items-center gap-2 text-xl font-bold text-green-600 hover:text-green-700">
                🎮 <span>Learning Games</span>
            </a>
            <div class="hidden md:flex items-center gap-2">
                <a href="../" class="px-3 py-1 rounded-full text-gray-500 hover:bg-purple-50 hover:text-purple-600 font-semibold transition">
                    <i class="fa-solid fa-house mr-1"></i>Home
                </a>
                <a href="../counting/" class="px-3 py-1 rounded-full text-gray-500 hover:bg-purple-50 hover:text-purple-600 font-semibold transition">
                    🔢 Counting
                </a>
                <a href="./" class="px-3 py-1 rounded-full bg-purple-100 text-purple-700 font-semibold">
                    ➕ Addition
                </a>
            </div>
            <button onclick="toggleNav()" class="md:hidden text-gray-500 hover:text-purple-600 text-2xl w-10 h-10 flex items-center justify-center rounded-full hover:bg-purple-50 transition" aria-label="Menu">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
        <div id="mobile-menu">
            <div class="max-w-lg mx-auto px-4 pb-3 flex flex-col gap-1">
                <a href="../" class="flex items-center gap-2 px-3 py-2 rounded-xl text-gray-600 hover:bg-purple-50 hover:text-purple-700 font-semibold transition">
                    <i class="fa-solid fa-house"></i> Home
                </a>
                <a href="../counting/" class="flex items-center gap-2 px-3 py-2 rounded-xl text-gray-600 hover:bg-purple-50 hover:text-purple-700 font-semibold transition">
                    🔢 Counting
                </a>
                <a href="./" class="flex items-center gap-2 px-3 py-2 rounded-xl bg-purple-100 text-purple-700 font-semibold">
                    ➕ Addition
                </a>
            </div>
        </div>
    </nav>

    <!-- START SCREEN -->
    <div id="start-screen" class="flex-grow flex flex-col items-center justify-center">
        <div class="text-8xl mb-6 animate-pop">➕</div>
        <h1 class="text-4xl md:text-5xl font-bold text-purple-600 mb-3 text-center px-4">Addition Game</h1>
        <p class="text-gray-400 text-xl mb-8">Add the numbers!</p>
        <button onclick="startGame()" class="kid-btn bg-yellow-400 hover:bg-yellow-500 text-yellow-900 text-3xl font-bold py-4 px-10 rounded-full border-4 border-yellow-500">
            PLAY <i class="fa-solid fa-play ml-2"></i>
        </button>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="hidden flex-grow flex flex-col max-w-lg mx-auto w-full p-4">

        <!-- Header -->
        <div class="flex justify-between items-center mb-2">
            <button onclick="readQuestion()" class="kid-btn bg-purple-400 text-white w-14 h-14 rounded-full text-2xl flex items-center justify-center border-4 border-purple-500" title="Hear the question">
                <i class="fa-solid fa-volume-high"></i>
            </button>
            <div class="bg-white px-4 py-2 rounded-full border-4 border-yellow-400 shadow-md flex items-center gap-2">
                <i class="fa-solid fa-star text-yellow-400 text-2xl"></i>
                <span id="score-display" class="text-2xl font-bold text-gray-700">0</span>
            </div>
        </div>

        <!-- Main game -->
        <div class="flex-grow flex flex-col items-center justify-center gap-8 pb-4">

            <!-- Visual aid: two groups of dots -->
            <div class="flex items-center gap-4">
                <div id="dots-a" class="flex flex-wrap justify-center gap-1 max-w-[120px]"></div>
                <span class="text-5xl font-bold text-gray-300">+</span>
                <div id="dots-b" class="flex flex-wrap justify-center gap-1 max-w-[120px]"></div>
            </div>

            <!-- Equation -->
            <div id="equation" class="bg-white rounded-3xl border-4 border-purple-200 shadow-md px-8 py-5 text-6xl md:text-7xl font-bold text-gray-700 animate-pop text-center">
                2 + 3 = ?
            </div>

            <!-- Answer choices -->
            <div class="grid grid-cols-2 gap-4 w-full max-w-xs" id="answer-bank"></div>

        </div>
    </div>

    <script>
        let correctAnswer = 0;
        let score = 0;
        const answerColors = [
            'bg-red-400 border-red-500',
            'bg-blue-400 border-blue-500',
            'bg-orange-400 border-orange-500',
            'bg-teal-400 border-teal-500',
        ];

        const startScreen  = document.getElementById('start-screen');
        const gameScreen   = document.getElementById('game-screen');
        const equationEl   = document.getElementById('equation');
        const answerBank   = document.getElementById('answer-bank');
        const scoreDisplay = document.getElementById('score-display');
        const dotsA        = document.getElementById('dots-a');
        const dotsB        = document.getElementById('dots-b');

        function speak(text, rate = 0.85, pitch = 1.2, cancel = true) {
            if (!window.speechSynthesis) return;
            if (cancel) window.speechSynthesis.cancel();
            const utt = new SpeechSynthesisUtterance(text);
            utt.rate = rate; utt.pitch = pitch;
            window.speechSynthesis.speak(utt);
        }

        function readQuestion() {
            const parts = equationEl.innerText.replace('= ?', '').trim().split('+');
            if (parts.length === 2) {
                speak(`What is ${parts[0].trim()} plus ${parts[1].trim()}?`, 0.85, 1.2, true);
            }
        }

        function startGame() {
            startScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            speak("Let's add!");
            setTimeout(loadRound, 1200);
        }

        function renderDots(container, count, color) {
            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const dot = document.createElement('div');
                dot.className = `w-6 h-6 rounded-full ${color} animate-pop`;
                dot.style.animationDelay = `${i * 0.05}s`;
                container.appendChild(dot);
            }
        }

        function loadRound() {
            const a = Math.floor(Math.random() * 5) + 1; // 1-5
            const b = Math.floor(Math.random() * 5) + 1; // 1-5
            correctAnswer = a + b;

            // Visual dots
            renderDots(dotsA, a, 'bg-purple-400');
            renderDots(dotsB, b, 'bg-pink-400');

            // Equation
            equationEl.classList.remove('animate-pop');
            void equationEl.offsetWidth;
            equationEl.classList.add('animate-pop');
            equationEl.innerText = `${a} + ${b} = ?`;

            // Generate 4 unique answer choices including the correct one
            const choices = new Set([correctAnswer]);
            while (choices.size < 4) {
                const offset = Math.floor(Math.random() * 5) + 1;
                const wrong = correctAnswer + (Math.random() < 0.5 ? offset : -offset);
                if (wrong > 0 && wrong !== correctAnswer) choices.add(wrong);
            }
            const shuffled = [...choices].sort(() => 0.5 - Math.random());
            const colors = [...answerColors].sort(() => 0.5 - Math.random());

            answerBank.innerHTML = '';
            shuffled.forEach((n, i) => {
                const btn = document.createElement('button');
                btn.className = `kid-btn ${colors[i]} text-white h-20 rounded-2xl text-4xl md:text-5xl font-bold border-b-8 animate-pop`;
                btn.style.animationDelay = `${i * 0.07}s`;
                btn.innerText = n;
                btn.onclick = () => handleAnswer(n, btn);
                answerBank.appendChild(btn);
            });

            setTimeout(readQuestion, 400);
        }

        function handleAnswer(chosen, btn) {
            if (chosen === correctAnswer) {
                speak(`${correctAnswer}! Excellent!`, 0.9, 1.3, true);
                score++;
                scoreDisplay.innerText = score;

                equationEl.innerText = equationEl.innerText.replace('?', correctAnswer);
                equationEl.classList.add('animate-win');

                answerBank.querySelectorAll('button').forEach(b => b.disabled = true);
                btn.classList.remove(...answerColors.flatMap(c => c.split(' ')));
                btn.classList.add('bg-green-400','border-green-500','ring-4','ring-green-300');

                confetti({
                    particleCount: 120,
                    spread: 65,
                    origin: { y: 0.5 },
                    colors: ['#f87171','#fbbf24','#34d399','#60a5fa','#c084fc'],
                });

                setTimeout(() => {
                    equationEl.classList.remove('animate-win');
                    loadRound();
                }, 2800);
            } else {
                speak('Try again!', 0.9, 1.0, true);
                btn.classList.remove('animate-shake');
                void btn.offsetWidth;
                btn.classList.add('animate-shake');
                btn.disabled = true;
            }
        }

        function toggleNav() {
            document.getElementById('mobile-menu').classList.toggle('open');
        }
    </script>
</body>
</html>
