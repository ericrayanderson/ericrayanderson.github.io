<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Counting Game ¬Ј Learning Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #eff6ff;
            background-image: radial-gradient(#bfdbfe 2px, transparent 2px);
            background-size: 30px 30px;
            touch-action: manipulation;
            user-select: none;
        }
        @keyframes popIn {
            0%   { transform: scale(0.5); opacity: 0; }
            80%  { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        @keyframes bounce-win {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-18px); }
        }
        .animate-pop   { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-shake { animation: shake 0.4s ease-in-out; }
        .animate-win   { animation: bounce-win 0.5s ease-in-out infinite; }

        .kid-btn {
            transition: all 0.1s;
            box-shadow: 0 6px 0 rgba(0,0,0,0.2);
        }
        .kid-btn:active:not(:disabled) {
            transform: translateY(6px);
            box-shadow: 0 0 0 rgba(0,0,0,0.2);
        }
        .kid-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: translateY(6px);
            box-shadow: 0 0 0 rgba(0,0,0,0.2);
        }
        #mobile-menu { transition: max-height 0.3s ease, opacity 0.3s ease; max-height: 0; opacity: 0; overflow: hidden; }
        #mobile-menu.open { max-height: 200px; opacity: 1; }
    </style>
</head>
<body class="min-h-screen flex flex-col text-gray-800">

    <!-- NAVBAR -->
    <nav class="bg-white shadow-md z-40 relative">
        <div class="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
            <a href="../" class="flex items-center gap-2 text-xl font-bold text-green-600 hover:text-green-700">
                рЯОЃ <span>Learning Games</span>
            </a>
            <div class="hidden md:flex items-center gap-2">
                <a href="../" class="px-3 py-1 rounded-full text-gray-500 hover:bg-blue-50 hover:text-blue-600 font-semibold transition">
                    <i class="fa-solid fa-house mr-1"></i>Home
                </a>
                <a href="./" class="px-3 py-1 rounded-full bg-blue-100 text-blue-700 font-semibold">
                    рЯФҐ Counting
                </a>
                <a href="../addition/" class="px-3 py-1 rounded-full text-gray-500 hover:bg-blue-50 hover:text-blue-600 font-semibold transition">
                    вЮХ Addition
                </a>
            </div>
            <button onclick="toggleNav()" class="md:hidden text-gray-500 hover:text-blue-600 text-2xl w-10 h-10 flex items-center justify-center rounded-full hover:bg-blue-50 transition" aria-label="Menu">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
        <div id="mobile-menu">
            <div class="max-w-lg mx-auto px-4 pb-3 flex flex-col gap-1">
                <a href="../" class="flex items-center gap-2 px-3 py-2 rounded-xl text-gray-600 hover:bg-blue-50 hover:text-blue-700 font-semibold transition">
                    <i class="fa-solid fa-house"></i> Home
                </a>
                <a href="./" class="flex items-center gap-2 px-3 py-2 rounded-xl bg-blue-100 text-blue-700 font-semibold">
                    рЯФҐ Counting
                </a>
                <a href="../addition/" class="flex items-center gap-2 px-3 py-2 rounded-xl text-gray-600 hover:bg-blue-50 hover:text-blue-700 font-semibold transition">
                    вЮХ Addition
                </a>
            </div>
        </div>
    </nav>

    <!-- START SCREEN -->
    <div id="start-screen" class="flex-grow flex flex-col items-center justify-center">
        <div class="text-8xl mb-6 animate-pop">рЯФҐ</div>
        <h1 class="text-4xl md:text-5xl font-bold text-blue-600 mb-3 text-center px-4">Counting Game</h1>
        <p class="text-gray-400 text-xl mb-8">How many can you count?</p>
        <button onclick="startGame()" class="kid-btn bg-yellow-400 hover:bg-yellow-500 text-yellow-900 text-3xl font-bold py-4 px-10 rounded-full border-4 border-yellow-500">
            PLAY <i class="fa-solid fa-play ml-2"></i>
        </button>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="hidden flex-grow flex flex-col max-w-lg mx-auto w-full p-4">

        <!-- Header -->
        <div class="flex justify-between items-center mb-2">
            <button onclick="readQuestion()" class="kid-btn bg-blue-400 text-white w-14 h-14 rounded-full text-2xl flex items-center justify-center border-4 border-blue-500" title="Hear the question">
                <i class="fa-solid fa-volume-high"></i>
            </button>
            <div class="bg-white px-4 py-2 rounded-full border-4 border-yellow-400 shadow-md flex items-center gap-2">
                <i class="fa-solid fa-star text-yellow-400 text-2xl"></i>
                <span id="score-display" class="text-2xl font-bold text-gray-700">0</span>
            </div>
        </div>

        <!-- Main game -->
        <div class="flex-grow flex flex-col items-center justify-center gap-6 pb-4">

            <!-- Question prompt -->
            <p class="text-2xl md:text-3xl font-bold text-gray-500">How many?</p>

            <!-- Emoji grid -->
            <div id="emoji-grid" class="flex flex-wrap justify-center gap-2 max-w-xs min-h-[120px] items-center"></div>

            <!-- Number buttons 1вАУ9 -->
            <div class="grid grid-cols-5 gap-3" id="number-bank"></div>

        </div>
    </div>

    <script>
        const emojiSets = ['в≠Р','рЯНО','рЯРЄ','рЯ¶Л','рЯМЄ','рЯНХ','рЯОИ','рЯРґ','рЯМЯ','рЯ¶Д','рЯР†','рЯН¶','рЯЪА','рЯМИ','рЯОА'];

        let currentCount = 0;
        let score = 0;
        let currentEmoji = '';
        const buttonColors = [
            'bg-red-400 border-red-500','bg-orange-400 border-orange-500',
            'bg-yellow-400 border-yellow-500','bg-green-400 border-green-500',
            'bg-teal-400 border-teal-500','bg-blue-400 border-blue-500',
            'bg-indigo-400 border-indigo-500','bg-purple-400 border-purple-500',
            'bg-pink-400 border-pink-500',
        ];

        const startScreen  = document.getElementById('start-screen');
        const gameScreen   = document.getElementById('game-screen');
        const emojiGrid    = document.getElementById('emoji-grid');
        const numberBank   = document.getElementById('number-bank');
        const scoreDisplay = document.getElementById('score-display');

        function speak(text, rate = 0.8, pitch = 1.2, cancel = true) {
            if (!window.speechSynthesis) return;
            if (cancel) window.speechSynthesis.cancel();
            const utt = new SpeechSynthesisUtterance(text);
            utt.rate = rate; utt.pitch = pitch;
            window.speechSynthesis.speak(utt);
        }

        function readQuestion() {
            speak(`How many ${currentEmoji}?`, 0.8, 1.2, true);
        }

        function startGame() {
            startScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            speak("Let's count!");
            setTimeout(loadRound, 1200);
        }

        function loadRound() {
            currentEmoji = emojiSets[Math.floor(Math.random() * emojiSets.length)];
            currentCount = Math.floor(Math.random() * 9) + 1; // 1-9

            // Render emojis
            emojiGrid.innerHTML = '';
            for (let i = 0; i < currentCount; i++) {
                const span = document.createElement('span');
                span.className = 'text-5xl md:text-6xl animate-pop';
                span.style.animationDelay = `${i * 0.06}s`;
                span.innerText = currentEmoji;
                emojiGrid.appendChild(span);
            }

            // Render number buttons 1-9
            numberBank.innerHTML = '';
            for (let n = 1; n <= 9; n++) {
                const btn = document.createElement('button');
                btn.className = `kid-btn ${buttonColors[n-1]} text-white w-14 h-14 md:w-16 md:h-16 rounded-2xl text-2xl md:text-3xl font-bold border-b-4 animate-pop`;
                btn.style.animationDelay = `${(n-1) * 0.04}s`;
                btn.innerText = n;
                btn.onclick = () => handleAnswer(n, btn);
                numberBank.appendChild(btn);
            }

            setTimeout(readQuestion, 500);
        }

        function handleAnswer(chosen, btn) {
            if (chosen === currentCount) {
                speak(`${currentCount}! Great job!`, 0.9, 1.3, true);
                score++;
                scoreDisplay.innerText = score;

                // Flash all emojis with win bounce
                emojiGrid.querySelectorAll('span').forEach(s => s.classList.add('animate-win'));

                // Disable all buttons
                numberBank.querySelectorAll('button').forEach(b => b.disabled = true);
                // Highlight correct
                btn.classList.remove(...buttonColors.flatMap(c => c.split(' ')));
                btn.classList.add('bg-green-400','border-green-500','scale-110','ring-4','ring-green-300');

                confetti({
                    particleCount: 120,
                    spread: 60,
                    origin: { y: 0.5 },
                    colors: ['#f87171','#fbbf24','#34d399','#60a5fa','#c084fc'],
                });

                setTimeout(loadRound, 2800);
            } else {
                speak('Try again!', 0.9, 1.0, true);
                btn.classList.remove('animate-shake');
                void btn.offsetWidth;
                btn.classList.add('animate-shake');
                btn.disabled = true;
                btn.style.opacity = '0.25';
            }
        }

        function toggleNav() {
            document.getElementById('mobile-menu').classList.toggle('open');
        }
    </script>
</body>
</html>
